<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" style="font-family: system-ui, sans-serif;">
  <title>Su Bardağı Eşdeğerlik Tablosu</title>
  <desc>1 Su bardağının diğer ölçü birimleri cinsinden karşılıkları.</desc>

  <rect width="600" height="400" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Sol Taraf: Su Bardağı Çizimi -->
  <g transform="translate(120, 200)">
    <path d="M-60,-120 L-45,120 L45,120 L60,-120 Z" fill="none" stroke="#2563EB" stroke-width="4"/>
    <path d="M-55,-30 L-45,120 L45,120 L55,-30 Z" fill="#EFF6FF"/>
    
    <!-- Ölçü Çizgileri -->
    <line x1="-50" y1="60" x2="-40" y2="60" stroke="#2563EB" stroke-width="2"/>
    <line x1="-52" y1="0" x2="-42" y2="0" stroke="#2563EB" stroke-width="2"/>
    <line x1="-55" y1="-60" x2="-45" y2="-60" stroke="#2563EB" stroke-width="2"/>
    
    <text x="0" y="-140" text-anchor="middle" font-weight="bold" font-size="20" fill="#0F172A">1 Su Bardağı</text>
    <text x="0" y="30" text-anchor="middle" font-weight="bold" font-size="24" fill="#2563EB">200 ml</text>
  </g>

  <!-- Sağ Taraf: Eşdeğerlik Listesi -->
  <g transform="translate(250, 60)">
    <!-- Başlık Kutusu -->
    <rect x="0" y="0" width="300" height="50" rx="8" fill="#EFF6FF"/>
    <text x="150" y="32" text-anchor="middle" font-weight="bold" font-size="18" fill="#2563EB">Buna Eşittir (=)</text>

    <!-- Satır 1: Çay Bardağı -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="20" y="32" font-size="20">☕</text>
      <text x="60" y="30" font-weight="bold" font-size="16" fill="#0F172A">2 Çay Bardağı</text>
      <!-- Mini bardak ikonları -->
      <g transform="translate(240, 25) scale(0.4)">
        <path d="M-15,-30 C-20,0 -10,20 -5,30 L5,30 C10,20 20,0 15,-30 Z" fill="#EFF6FF" stroke="#64748B" stroke-width="3"/>
      </g>
      <g transform="translate(270, 25) scale(0.4)">
        <path d="M-15,-30 C-20,0 -10,20 -5,30 L5,30 C10,20 20,0 15,-30 Z" fill="#EFF6FF" stroke="#64748B" stroke-width="3"/>
      </g>
    </g>

    <!-- Satır 2: Yemek Kaşığı -->
    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="20" y="32" font-size="20">🥄</text>
      <text x="60" y="30" font-weight="bold" font-size="16" fill="#0F172A">13⅓ Yemek Kaşığı</text>
      <text x="230" y="30" font-weight="bold" font-size="16" fill="#64748B">×13</text>
      <g transform="translate(270, 25) scale(0.6) rotate(-45)">
        <path d="M0,0 C-10,-25 25,-25 30,-5 L70,-5 L70,5 L30,5 C25,25 -10,25 0,0" fill="none" stroke="#64748B" stroke-width="3"/>
      </g>
    </g>

    <!-- Satır 3: Tatlı Kaşığı -->
    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="20" y="32" font-size="20">🥄</text>
      <text x="60" y="30" font-weight="bold" font-size="16" fill="#0F172A">20 Tatlı Kaşığı</text>
      <text x="230" y="30" font-weight="bold" font-size="16" fill="#64748B">×20</text>
      <g transform="translate(270, 25) scale(0.5) rotate(-45)">
        <path d="M0,0 C-8,-20 20,-20 25,-5 L60,-5 L60,5 L25,5 C20,20 -8,20 0,0" fill="none" stroke="#64748B" stroke-width="3"/>
      </g>
    </g>

    <!-- Satır 4: Çay Kaşığı -->
    <g transform="translate(0, 250)">
      <rect x="0" y="0" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="20" y="32" font-size="20">🫖</text>
      <text x="60" y="30" font-weight="bold" font-size="16" fill="#0F172A">40 Çay Kaşığı</text>
      <text x="230" y="30" font-weight="bold" font-size="16" fill="#64748B">×40</text>
      <g transform="translate(270, 25) scale(0.4) rotate(-45)">
        <path d="M0,0 C-5,-15 15,-15 20,-5 L50,-5 L50,5 L20,5 C15,15 -5,15 0,0" fill="none" stroke="#64748B" stroke-width="3"/>
      </g>
    </g>
  </g>
</svg>