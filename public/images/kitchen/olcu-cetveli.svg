<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" style="font-family: system-ui, sans-serif;">
  <title>Mutfak Ölçü Birimleri Karşılaştırma Cetveli</title>
  <desc>Çay kaşığından litreye kadar mutfak ölçü birimlerinin hacimsel karşılaştırması.</desc>

  <rect width="600" height="320" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>

  <g transform="translate(30, 0)">
    <!-- Çay Kaşığı (5ml) -->
    <g transform="translate(10, 150)">
      <path d="M0,0 C-5,-15 15,-15 20,-5 L50,-5 L50,5 L20,5 C15,15 -5,15 0,0" fill="none" stroke="#64748B" stroke-width="2" transform="scale(0.6) rotate(-45)"/>
      <text x="0" y="50" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">Çay Kaşığı</text>
      <text x="0" y="65" text-anchor="middle" font-size="10" fill="#64748B">5 ml</text>
      <rect x="-20" y="85" width="40" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-20" y="85" width="2" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- Tatlı Kaşığı (10ml) -->
    <g transform="translate(90, 140)">
      <path d="M0,0 C-8,-20 20,-20 25,-5 L60,-5 L60,5 L25,5 C20,20 -8,20 0,0" fill="none" stroke="#64748B" stroke-width="2" transform="scale(0.8) rotate(-45)"/>
      <text x="0" y="60" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">Tatlı Kaşığı</text>
      <text x="0" y="75" text-anchor="middle" font-size="10" fill="#64748B">10 ml</text>
      <rect x="-25" y="95" width="50" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-25" y="95" width="4" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- Yemek Kaşığı (15ml) -->
    <g transform="translate(180, 130)">
      <path d="M0,0 C-10,-25 25,-25 30,-5 L70,-5 L70,5 L30,5 C25,25 -10,25 0,0" fill="none" stroke="#64748B" stroke-width="2" transform="scale(1) rotate(-45)"/>
      <text x="0" y="70" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">Yemek Kaşığı</text>
      <text x="0" y="85" text-anchor="middle" font-size="10" fill="#64748B">15 ml</text>
      <rect x="-35" y="105" width="70" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-35" y="105" width="6" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- Çay Bardağı (100ml) -->
    <g transform="translate(270, 120)">
      <path d="M-15,-30 C-20,0 -10,20 -5,30 L5,30 C10,20 20,0 15,-30 Z" fill="none" stroke="#64748B" stroke-width="2"/>
      <path d="M-13,-10 C-18,10 -8,25 -5,30 L5,30 C8,25 18,10 13,-10 Z" fill="#EFF6FF"/>
      <text x="0" y="80" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">Çay Bardağı</text>
      <text x="0" y="95" text-anchor="middle" font-size="10" fill="#64748B">100 ml</text>
      <rect x="-30" y="115" width="60" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-30" y="115" width="10" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- Su Bardağı (200ml) -->
    <g transform="translate(360, 100)">
      <path d="M-20,-40 L-15,40 L15,40 L20,-40 Z" fill="none" stroke="#64748B" stroke-width="2"/>
      <path d="M-18,-10 L-15,40 L15,40 L18,-10 Z" fill="#EFF6FF"/>
      <text x="0" y="100" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">Su Bardağı</text>
      <text x="0" y="115" text-anchor="middle" font-size="10" fill="#64748B">200 ml</text>
      <rect x="-30" y="135" width="60" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-30" y="135" width="20" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- ½ Litre (500ml) -->
    <g transform="translate(450, 70)">
      <path d="M-30,-60 L-25,60 L25,60 L30,-60 Z" fill="none" stroke="#64748B" stroke-width="2"/>
      <path d="M-28,-10 L-25,60 L25,60 L28,-10 Z" fill="#EFF6FF"/>
      <text x="0" y="130" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">½ Litre</text>
      <text x="0" y="145" text-anchor="middle" font-size="10" fill="#64748B">500 ml</text>
      <rect x="-30" y="165" width="60" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-30" y="165" width="40" height="6" rx="3" fill="#2563EB"/>
    </g>

    <!-- 1 Litre (1000ml) -->
    <g transform="translate(520, 50)">
      <path d="M-35,-80 L-30,80 L30,80 L35,-80 Z" fill="none" stroke="#64748B" stroke-width="2"/>
      <path d="M30,0 C40,0 45,10 45,20 L45,50 C45,60 40,70 30,70" fill="none" stroke="#64748B" stroke-width="2"/>
      <path d="M-33,-10 L-30,80 L30,80 L33,-10 Z" fill="#EFF6FF"/>
      <text x="0" y="150" text-anchor="middle" font-weight="bold" font-size="12" fill="#0F172A">1 Litre</text>
      <text x="0" y="165" text-anchor="middle" font-size="10" fill="#64748B">1000 ml</text>
      <rect x="-25" y="185" width="50" height="6" rx="3" fill="#E2E8F0"/>
      <rect x="-25" y="185" width="50" height="6" rx="3" fill="#2563EB"/>
    </g>
  </g>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-weight="bold" font-size="18" fill="#2563EB">Mutfak Ölçü Birimleri Hacim Karşılaştırması</text>
</svg>